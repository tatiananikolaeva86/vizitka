<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Николаева Татьяна — специалист по созданию нейроагентов</title>
<style>
  :root{
    --bg: #0d0a17;
    --violet: #8a5cf6;
    --cyan: #33d9ff;
    --pink: #ff5cb3;
    --telegram: #33b6ff;
    --whatsapp: #34d399;
    --text-dim: #a6acc2;
    --font-display: 'Segoe UI', system-ui, 'Helvetica Neue', Arial, sans-serif;
    --font-mono: 'Cascadia Code', 'SFMono-Regular', Consolas, 'Roboto Mono', monospace;
  }

  *{ box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body{
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background:
      radial-gradient(ellipse 75% 50% at 18% 12%, rgba(138,92,246,0.24), transparent 60%),
      radial-gradient(ellipse 65% 55% at 88% 78%, rgba(51,217,255,0.16), transparent 62%),
      radial-gradient(ellipse 60% 45% at 55% 105%, rgba(255,92,179,0.14), transparent 60%),
      linear-gradient(180deg, #120c22 0%, #150e26 40%, #0b0714 100%);
    background-color: var(--bg);
    overflow-x: hidden;
    font-family: var(--font-display);
  }

  .bg-face{
    position: fixed;
    inset: 0;
    z-index: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    mix-blend-mode: screen;
    filter: blur(7px) drop-shadow(0 0 40px rgba(138,92,246,0.3)) drop-shadow(0 0 90px rgba(51,217,255,0.18));
    animation: face-breathe 8s ease-in-out infinite;
  }

  .bg-face canvas{
    width: min(78vw, 520px);
    height: auto;
    display: block;
  }

  @keyframes face-breathe{
    0%, 100%{ opacity: 0.4; transform: scale(1); }
    50%{ opacity: 0.55; transform: scale(1.015); }
  }

  #bg-canvas{
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 1;
    display: block;
  }

  .vignette{
    position: fixed;
    inset: 0;
    z-index: 2;
    pointer-events: none;
    background:
      radial-gradient(ellipse at 50% 30%, rgba(138,92,246,0.08), transparent 55%),
      radial-gradient(ellipse at 50% 100%, rgba(0,0,0,0.45), transparent 60%),
      radial-gradient(circle at 50% 50%, transparent 45%, rgba(0,0,0,0.32) 100%);
  }

  .stage{
    position: relative;
    z-index: 3;
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 18px;
  }

  .card{
    position: relative;
    width: 100%;
    max-width: 440px;
    padding: 48px 32px 40px;
    border-radius: 28px;
    text-align: center;
    background: linear-gradient(180deg, rgba(255,255,255,0.045), rgba(255,255,255,0.015));
    border: 1px solid rgba(150,140,255,0.18);
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.02) inset,
      0 30px 60px -20px rgba(0,0,0,0.7),
      0 0 90px -30px rgba(138,92,246,0.35);
    backdrop-filter: blur(10px);
    animation: card-in 0.9s cubic-bezier(.2,.8,.2,1) both;
  }

  @keyframes card-in{
    from{ opacity: 0; transform: translateY(24px) scale(0.97); }
    to{ opacity: 1; transform: translateY(0) scale(1); }
  }

  .avatar-badge{
    position: relative;
    width: 132px;
    height: 132px;
    margin: 0 auto 24px;
    border-radius: 50%;
    padding: 4px;
    background: linear-gradient(135deg, var(--cyan), var(--violet) 55%, var(--pink));
    box-shadow: 0 0 30px rgba(138,92,246,0.5), 0 0 64px rgba(51,217,255,0.25);
    animation: avatar-in 0.9s 0.1s cubic-bezier(.2,.8,.2,1) both;
  }

  .avatar-frame{
    position: relative;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    overflow: hidden;
    background: var(--bg);
  }

  .avatar-badge img{
    width: 100%;
    height: 100%;
    display: block;
    object-fit: cover;
    object-position: 50% 20%;
    filter: saturate(0.8) contrast(1.08) brightness(0.9) hue-rotate(-8deg);
  }

  .avatar-frame::after{
    content: "";
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 50% 28%, transparent 40%, rgba(13,10,23,0.65) 85%),
      linear-gradient(160deg, rgba(51,217,255,0.28), rgba(138,92,246,0.32) 55%, rgba(255,92,179,0.26));
    mix-blend-mode: color;
    pointer-events: none;
  }

  @keyframes avatar-in{
    from{ opacity: 0; transform: translateY(-14px) scale(0.75); }
    to{ opacity: 1; transform: translateY(0) scale(1); }
  }

  @media (max-width: 380px){
    .avatar-badge{ width: 104px; height: 104px; margin-bottom: 18px; }
  }

  .kicker{
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin: 0 auto 22px;
    padding: 7px 16px;
    border-radius: 999px;
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: #b9f3ff;
    background: rgba(51,217,255,0.06);
    border: 1px solid rgba(51,217,255,0.25);
    box-shadow: 0 0 22px rgba(51,217,255,0.18);
  }

  .kicker .dot{
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--cyan);
    box-shadow: 0 0 10px var(--cyan), 0 0 20px var(--cyan);
    animation: dot-blink 1.8s ease-in-out infinite;
  }

  @keyframes dot-blink{
    0%, 100%{ opacity: 1; }
    50%{ opacity: 0.35; }
  }

  .name{
    margin: 0 0 10px;
    font-family: var(--font-display);
    font-size: clamp(32px, 8vw, 44px);
    font-weight: 800;
    letter-spacing: -0.5px;
    line-height: 1.12;
    background: linear-gradient(100deg, var(--cyan), var(--violet) 45%, var(--pink) 85%);
    background-size: 200% 200%;
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    filter: drop-shadow(0 0 18px rgba(138,92,246,0.45));
    animation: shine 6s ease-in-out infinite;
  }

  @keyframes shine{
    0%{ background-position: 0% 50%; }
    50%{ background-position: 100% 50%; }
    100%{ background-position: 0% 50%; }
  }

  .role{
    margin: 0 auto 30px;
    max-width: 310px;
    color: var(--text-dim);
    font-size: 15px;
    line-height: 1.6;
    letter-spacing: 0.2px;
  }

  .role .accent{
    display: block;
    margin-bottom: 4px;
    font-family: var(--font-mono);
    font-size: 13.5px;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: #cfe0ff;
    font-weight: 600;
  }

  .divider{
    width: 60px;
    height: 2px;
    margin: 0 auto 30px;
    border-radius: 2px;
    background: linear-gradient(90deg, var(--cyan), var(--violet), var(--pink));
    opacity: 0.6;
  }

  .contacts{
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .btn{
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 16px 22px;
    border-radius: 16px;
    text-decoration: none;
    font-size: 16px;
    font-weight: 600;
    color: #fff;
    border: 1px solid rgba(255,255,255,0.08);
    isolation: isolate;
    transform: translateZ(0);
    transition: transform 0.25s ease, box-shadow 0.25s ease, filter 0.25s ease;
    cursor: pointer;
  }

  .btn svg{ width: 22px; height: 22px; flex-shrink: 0; position: relative; z-index: 2; }
  .btn span{ position: relative; z-index: 2; }

  .btn::before{
    content: "";
    position: absolute;
    inset: 0;
    z-index: 0;
    background: linear-gradient(135deg, var(--from), var(--to));
  }

  .btn::after{
    content: "";
    position: absolute;
    inset: -2px;
    z-index: 1;
    border-radius: inherit;
    background: linear-gradient(120deg, transparent 20%, rgba(255,255,255,0.35) 50%, transparent 80%);
    background-size: 250% 100%;
    background-position: 150% 0;
    mix-blend-mode: overlay;
    transition: none;
  }

  .btn:hover, .btn:active{
    transform: translateY(-3px) scale(1.015);
  }

  .btn.primary{
    --from: #6c3ff0;
    --to: #33d9ff;
    box-shadow: 0 10px 30px -8px rgba(108,63,240,0.6), 0 0 0 1px rgba(255,255,255,0.05) inset;
    animation: sheen-loop 3.4s ease-in-out infinite;
  }
  .btn.primary:hover{
    box-shadow: 0 14px 40px -6px rgba(51,217,255,0.65), 0 0 30px rgba(108,63,240,0.5);
  }

  .btn.telegram{
    --from: #2fa9e8;
    --to: #34d5ff;
    box-shadow: 0 8px 24px -8px rgba(47,169,232,0.55);
  }
  .btn.telegram:hover{
    box-shadow: 0 12px 34px -6px rgba(51,197,255,0.6), 0 0 26px rgba(51,197,255,0.35);
  }

  .btn.whatsapp{
    --from: #22b06b;
    --to: #34d399;
    box-shadow: 0 8px 24px -8px rgba(34,176,107,0.5);
  }
  .btn.whatsapp:hover{
    box-shadow: 0 12px 34px -6px rgba(52,211,153,0.6), 0 0 26px rgba(52,211,153,0.3);
  }

  @keyframes sheen-loop{
    0%, 60%, 100%{ background-position: 150% 0; }
    30%{ background-position: -50% 0; }
  }
  .btn::after{ animation: inherit; }

  .ripple{
    position: absolute;
    border-radius: 50%;
    transform: scale(0);
    background: rgba(255,255,255,0.5);
    pointer-events: none;
    z-index: 3;
    animation: ripple-anim 650ms ease-out forwards;
  }

  @keyframes ripple-anim{
    to{ transform: scale(2.6); opacity: 0; }
  }

  .footer-note{
    margin-top: 28px;
    font-size: 12.5px;
    color: rgba(154,160,174,0.55);
    letter-spacing: 0.3px;
  }

  @media (max-width: 380px){
    .card{ padding: 40px 22px 32px; border-radius: 22px; }
    .btn{ font-size: 15px; padding: 14px 16px; }
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition: none !important; }
  }
</style>
</head>

    var canvas = document.getElementById('face-canvas');
    var img = new Image();
    img.onload = function(){
      var w = img.naturalWidth, h = img.naturalHeight;
      canvas.width = w;
      canvas.height = h;
      var ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      var imgData = ctx.getImageData(0, 0, w, h);
      var d = imgData.data;
      for (var i = 0; i < d.length; i += 4){
        var r = d[i], g = d[i+1], b = d[i+2];
        var minc = Math.min(r, g, b);
        var maxc = Math.max(r, g, b);
        var sat = maxc - minc;
        if (minc > 225 && sat < 18){
          d[i+3] = 0;
        } else if (minc > 190 && sat < 30){
          var t = (minc - 190) / (225 - 190);
          d[i+3] = Math.round(d[i+3] * (1 - t));
        }
      }
      ctx.putImageData(imgData, 0, 0);
    };
    img.src = FACE_IMG_SRC;
  })();

  // Neural network background animation
  (function(){
    var canvas = document.getElementById('bg-canvas');
    var ctx = canvas.getContext('2d');
    var w, h, dpr;
    var nodes = [];
    var reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    function resize(){
      dpr = Math.min(window.devicePixelRatio || 1, 2);
      w = window.innerWidth;
      h = window.innerHeight;
      canvas.width = w * dpr;
      canvas.height = h * dpr;
      canvas.style.width = w + 'px';
      canvas.style.height = h + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      initNodes();
    }

    function initNodes(){
      var count = Math.max(28, Math.min(80, Math.round((w * h) / 22000)));
      nodes = [];
      for (var i = 0; i < count; i++){
        nodes.push({
          x: Math.random() * w,
          y: Math.random() * h,
          vx: (Math.random() - 0.5) * 0.25,
          vy: (Math.random() - 0.5) * 0.25,
          r: Math.random() * 1.6 + 0.6
        });
      }
    }

    var mouse = { x: null, y: null };
    window.addEventListener('mousemove', function(e){
      mouse.x = e.clientX;
      mouse.y = e.clientY;
    });
    window.addEventListener('mouseleave', function(){
      mouse.x = null; mouse.y = null;
    });

    var linkDist = 140;

    function draw(){
      ctx.clearRect(0, 0, w, h);

      for (var i = 0; i < nodes.length; i++){
        var n = nodes[i];
        n.x += n.vx;
        n.y += n.vy;
        if (n.x < 0 || n.x > w) n.vx *= -1;
        if (n.y < 0 || n.y > h) n.vy *= -1;

        if (mouse.x !== null){
          var dx = mouse.x - n.x, dy = mouse.y - n.y;
          var d = Math.sqrt(dx*dx + dy*dy);
          if (d < 160){
            n.x -= dx * 0.0025;
            n.y -= dy * 0.0025;
          }
        }
      }

      for (var i = 0; i < nodes.length; i++){
        for (var j = i + 1; j < nodes.length; j++){
          var a = nodes[i], b = nodes[j];
          var dx = a.x - b.x, dy = a.y - b.y;
          var dist = Math.sqrt(dx*dx + dy*dy);
          if (dist < linkDist){
            var alpha = (1 - dist / linkDist) * 0.35;
            ctx.strokeStyle = 'rgba(138,150,255,' + alpha + ')';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(a.x, a.y);
            ctx.lineTo(b.x, b.y);
            ctx.stroke();
          }
        }
      }

      for (var i = 0; i < nodes.length; i++){
        var n = nodes[i];
        var grad = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.r * 4);
        grad.addColorStop(0, 'rgba(200,210,255,0.9)');
        grad.addColorStop(1, 'rgba(120,100,255,0)');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(n.x, n.y, n.r * 4, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = 'rgba(230,235,255,0.9)';
        ctx.beginPath();
        ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
        ctx.fill();
      }

      if (!reduceMotion) requestAnimationFrame(draw);
    }

    window.addEventListener('resize', resize);
    resize();
    draw();
  })();
</script>
